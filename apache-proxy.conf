# Apache Reverse Proxy Configuration for QN Code Assistant
#
# Prerequisites:
#   sudo a2enmod proxy proxy_http proxy_wstunnel headers rewrite ssl
#   sudo systemctl restart apache2
#
# Usage:
#   Copy this file to /etc/apache2/sites-available/qn-code-assistant.conf
#   Edit ServerName and SSL cert paths
#   sudo a2ensite qn-code-assistant && sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName claude.yourdomain.com

    # Redirect HTTP to HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName claude.yourdomain.com

    # SSL Configuration
    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/qn-code-assistant.pem
    SSLCertificateKeyFile /etc/ssl/private/qn-code-assistant-key.pem
    # SSLCertificateChainFile /etc/ssl/certs/chain.pem

    # Proxy to Flask backend
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:5001/
    ProxyPassReverse / http://127.0.0.1:5001/

    # WebSocket support (Socket.IO)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) ws://127.0.0.1:5001/$1 [P,L]

    # Required headers
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"

    # Timeouts for long-running WebSocket connections
    ProxyTimeout 3600
    Timeout 3600

    # Optional: Restrict access by IP
    # <Location />
    #     Require ip 192.168.1.0/24
    # </Location>

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/qn-code-assistant-error.log
    CustomLog ${APACHE_LOG_DIR}/qn-code-assistant-access.log combined
</VirtualHost>
