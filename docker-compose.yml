services:
  qn-code-assistant:
    build: .
    ports:
      - "5001:5001"
    volumes:
      # Persistent config and data — host paths take precedence over image defaults
      - ./config.json:/app/config.json
      - ./sessions:/app/sessions
      - ./user-data:/app/user-data
      # Mount the host ~/.claude directory read-only so the container can reach
      # the Claude Code CLI configuration without baking credentials into the image
      - ~/.claude:/home/app/.claude:ro
    environment:
      - QN_SECRET_KEY=${QN_SECRET_KEY:-}
    restart: unless-stopped
    # Inherit the HEALTHCHECK defined in the Dockerfile; compose surfaces the
    # health state in `docker compose ps` output automatically.
