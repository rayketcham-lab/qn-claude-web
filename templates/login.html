<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QN Code Assistant - Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-primary);
        }
        .login-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 32px;
            width: 380px;
            max-width: 90vw;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .login-card h1 {
            color: var(--claude-orange);
            font-size: 1.4rem;
            margin-bottom: 4px;
        }
        .login-card .subtitle {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-bottom: 24px;
        }
        .login-field {
            margin-bottom: 16px;
        }
        .login-field label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .login-field input {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9rem;
        }
        .login-field input:focus {
            outline: none;
            border-color: var(--claude-orange);
        }
        .login-btn {
            width: 100%;
            padding: 10px;
            background: var(--claude-orange);
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 500;
            transition: opacity 0.2s;
            margin-top: 8px;
        }
        .login-btn:hover { opacity: 0.9; }
        .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .login-error {
            color: var(--error);
            font-size: 0.8rem;
            margin-top: 12px;
            display: none;
        }
        .login-error.visible { display: block; }
        #confirm-field { display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>QN Code Assistant</h1>
        <div class="subtitle" id="login-subtitle">Sign in to continue</div>

        <form id="login-form" autocomplete="on">
            <div class="login-field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" autocomplete="username" required autofocus>
            </div>
            <div class="login-field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>
            <div class="login-field" id="confirm-field">
                <label for="password-confirm">Confirm Password</label>
                <input type="password" id="password-confirm" name="password-confirm" autocomplete="new-password">
            </div>
            <button type="submit" class="login-btn" id="login-btn">Sign In</button>
            <div class="login-error" id="login-error"></div>
        </form>
    </div>

    <script>
        (async function() {
            const status = await fetch('/api/auth/status').then(r => r.json());
            const isSetup = status.needs_setup;

            if (isSetup) {
                document.getElementById('login-subtitle').textContent = 'Create your account to get started';
                document.getElementById('confirm-field').style.display = 'block';
                document.getElementById('login-btn').textContent = 'Create Account';
                document.getElementById('password').autocomplete = 'new-password';
            }

            if (status.authenticated) {
                window.location.href = '/';
                return;
            }

            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const errorEl = document.getElementById('login-error');
                errorEl.classList.remove('visible');

                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;

                if (isSetup) {
                    const confirm = document.getElementById('password-confirm').value;
                    if (password !== confirm) {
                        errorEl.textContent = 'Passwords do not match';
                        errorEl.classList.add('visible');
                        return;
                    }
                    // Setup new account
                    try {
                        const res = await fetch('/api/auth/setup', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username, password })
                        });
                        const data = await res.json();
                        if (data.success) {
                            window.location.href = '/';
                        } else {
                            errorEl.textContent = data.error || 'Setup failed';
                            errorEl.classList.add('visible');
                        }
                    } catch (err) {
                        errorEl.textContent = 'Connection error';
                        errorEl.classList.add('visible');
                    }
                } else {
                    // Login
                    try {
                        const res = await fetch('/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username, password })
                        });
                        const data = await res.json();
                        if (data.success) {
                            window.location.href = '/';
                        } else {
                            errorEl.textContent = data.error || 'Invalid credentials';
                            errorEl.classList.add('visible');
                        }
                    } catch (err) {
                        errorEl.textContent = 'Connection error';
                        errorEl.classList.add('visible');
                    }
                }
            });
        })();
    </script>
</body>
</html>
