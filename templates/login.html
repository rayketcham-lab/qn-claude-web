<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QN Code Assistant - Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/login.css">
</head>
<body>
    <div class="login-card">
        <h1>QN Code Assistant</h1>
        <div class="subtitle" id="login-subtitle">Sign in to continue</div>

        <form id="login-form" autocomplete="on">
            <div class="login-field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" autocomplete="username" required autofocus>
            </div>
            <div class="login-field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>
            <div class="login-field" id="confirm-field">
                <label for="password-confirm">Confirm Password</label>
                <input type="password" id="password-confirm" name="password-confirm" autocomplete="new-password">
            </div>
            <button type="submit" class="login-btn" id="login-btn">Sign In</button>
            <div class="login-error" id="login-error"></div>
        </form>
    </div>

    <script src="/static/js/login.js"></script>
</body>
</html>
