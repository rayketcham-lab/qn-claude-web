# CI Pipeline — Lint + Unit Tests + SAST + Build Verification
# Runs on every push/PR to main. Self-hosted runner with working directory /opt/claude-web.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

defaults:
  run:
    working-directory: /opt/claude-web

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint
  # Runs ruff against app.py and the test suite. Fails the build on any
  # linting error so new code stays clean. Config lives in ruff.toml.
  # ---------------------------------------------------------------------------
  lint:
    runs-on: [self-hosted, qnca]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check app.py tests/

  # ---------------------------------------------------------------------------
  # Job 2: Unit Tests + Coverage
  # Syncs test files from the checkout into the on-disk working directory
  # (vendored deps already live at /opt/claude-web/vendor/) and runs the
  # full unittest suite with coverage instrumentation.
  # ---------------------------------------------------------------------------
  unit-tests:
    runs-on: [self-hosted, qnca]
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Copy test files from the fresh checkout to the on-disk project so
      # tests can import vendored dependencies that live on the runner.
      - name: Sync test files to working directory
        run: |
          rsync -a --delete "${GITHUB_WORKSPACE}/tests/" /opt/claude-web/tests/

      - name: Install coverage
        run: pip install coverage

      - name: Run unit tests with coverage
        id: tests
        run: |
          coverage run -m unittest discover -s tests -p 'test_*.py' -v 2>&1 | tee /tmp/unittest_output.txt
          exit ${PIPESTATUS[0]}

      - name: Verify minimum test count
        run: |
          TEST_COUNT=$(grep -oP 'Ran \K[0-9]+' /tmp/unittest_output.txt || echo 0)
          echo "Tests executed: ${TEST_COUNT}"
          if [ "${TEST_COUNT}" -lt 100 ]; then
            echo "::error::Test count ${TEST_COUNT} is below the required minimum of 100"
            exit 1
          fi
          echo "Test count ${TEST_COUNT} meets minimum threshold (>=100)"

      - name: Coverage report
        run: coverage report --show-missing

  # ---------------------------------------------------------------------------
  # Job 3: SAST — Bandit
  # Static security analysis on app.py at medium+ severity (-ll).
  # continue-on-error: true while existing findings are being triaged.
  # Flip to false once the baseline is clean.
  # ---------------------------------------------------------------------------
  sast:
    runs-on: [self-hosted, qnca]
    needs: unit-tests
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit SAST
        run: bandit -r app.py -ll

  # ---------------------------------------------------------------------------
  # Job 4: Build Verification
  # Rebuilds the installer, verifies hash integrity, and (on main only)
  # produces the self-extracting release artifact.
  # ---------------------------------------------------------------------------
  build-verify:
    runs-on: [self-hosted, qnca]
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build installer
        run: bash /opt/claude-web/build-installer.sh

      - name: Verify installer integrity
        run: |
          /opt/claude-web/install.sh --verify-only
          echo "Installer integrity check passed"

      - name: Build release artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          bash /opt/claude-web/build-release.sh 2>&1 | tee /tmp/build_release_output.txt

      - name: Verify release artifact exists
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          RELEASE_FILE=$(ls -t /opt/claude-web/qn-code-assistant-v*.sh 2>/dev/null | head -1)
          if [ -z "${RELEASE_FILE}" ]; then
            echo "::error::Release artifact not found — expected qn-code-assistant-v*.sh"
            exit 1
          fi
          echo "Release artifact verified: ${RELEASE_FILE}"
