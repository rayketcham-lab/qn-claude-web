# CI Pipeline — Lint + Unit Tests + SAST + Build Verification
# Runs on every push/PR to main. Self-hosted runner with working directory /opt/claude-web.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

defaults:
  run:
    working-directory: /opt/claude-web

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint
  # Runs ruff against app.py and the test suite. Fails the build on any
  # linting error so new code stays clean. Config lives in ruff.toml.
  # ---------------------------------------------------------------------------
  lint:
    runs-on: [self-hosted, qnca]

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install ruff
        run: pip install --break-system-packages ruff

      - name: Run ruff
        run: ruff check app.py tests/

  # ---------------------------------------------------------------------------
  # Job 2: Unit Tests + Coverage
  # Syncs test files from the checkout into the on-disk working directory
  # (vendored deps already live at /opt/claude-web/vendor/) and runs the
  # full unittest suite with coverage instrumentation.
  # ---------------------------------------------------------------------------
  unit-tests:
    runs-on: [self-hosted, qnca]
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Copy test files from the fresh checkout to the on-disk project so
      # tests can import vendored dependencies that live on the runner.
      # --no-owner/--no-group/--no-perms: the runner user (pleb) shares the
      # claude group but cannot chgrp to claude — let existing dir perms
      # (setgid, g+w) handle ownership instead of rsync preserving it.
      - name: Sync test files to working directory
        run: |
          rsync -rltD --delete --no-owner --no-group --no-perms \
            "${GITHUB_WORKSPACE}/tests/" /opt/claude-web/tests/

      - name: Install coverage
        run: pip install --break-system-packages coverage

      - name: Run unit tests with coverage
        id: tests
        run: |
          coverage run --source=. --omit='vendor/*,tests/*' -m unittest discover -s tests -p 'test_*.py' -v 2>&1 | tee ${RUNNER_TEMP}/unittest_output.txt
          exit ${PIPESTATUS[0]}

      - name: Verify minimum test count
        run: |
          TEST_COUNT=$(grep -oP 'Ran \K[0-9]+' ${RUNNER_TEMP}/unittest_output.txt || echo 0)
          echo "Tests executed: ${TEST_COUNT}"
          if [ "${TEST_COUNT}" -lt 100 ]; then
            echo "::error::Test count ${TEST_COUNT} is below the required minimum of 100"
            exit 1
          fi
          echo "Test count ${TEST_COUNT} meets minimum threshold (>=100)"

      - name: Coverage report
        run: coverage report --show-missing --fail-under=45

  # ---------------------------------------------------------------------------
  # Job 3: SAST — Bandit
  # Static security analysis on app.py at medium+ severity (-ll).
  # continue-on-error: true while existing findings are being triaged.
  # Flip to false once the baseline is clean.
  # ---------------------------------------------------------------------------
  sast:
    runs-on: [self-hosted, qnca]
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install bandit
        run: pip install --break-system-packages bandit

      - name: Run bandit SAST
        run: bandit -r /opt/claude-web/app.py -ll --skip B103,B104

  # ---------------------------------------------------------------------------
  # Job 4: Dependency Audit — pip-audit (Issue #37)
  # Scans vendored packages against OSV/PyPI advisory databases for known CVEs.
  # Generates a requirements list from vendor/*.dist-info to avoid needing a
  # live pip environment — the vendor/ directory is the source of truth.
  # continue-on-error: true initially so existing findings are visible but
  # non-blocking. Flip to false once the vendor baseline is clean.
  # ---------------------------------------------------------------------------
  dependency-audit:
    runs-on: [self-hosted, qnca]
    needs: unit-tests
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install pip-audit
        run: pip install --break-system-packages pip-audit

      - name: Generate requirements from vendor dist-info
        run: |
          ls -d /opt/claude-web/vendor/*.dist-info \
            | sed 's|.*/||' \
            | sed 's/\.dist-info$//' \
            | sed 's/_/-/g' \
            | sed 's/-\([0-9]\)/==\1/' \
            > ${RUNNER_TEMP}/vendor-pkgs.txt
          echo "Packages to audit:"
          cat ${RUNNER_TEMP}/vendor-pkgs.txt

      - name: Run pip-audit against vendor packages
        run: |
          pip-audit \
            -r ${RUNNER_TEMP}/vendor-pkgs.txt \
            --no-deps \
            -f json \
            -o ${RUNNER_TEMP}/pip-audit-results.json \
            --progress-spinner off \
          || true
          pip-audit \
            -r ${RUNNER_TEMP}/vendor-pkgs.txt \
            --no-deps \
            --progress-spinner off

  # ---------------------------------------------------------------------------
  # Job 5: Build Verification
  # Rebuilds the installer, verifies hash integrity, and (on main only)
  # produces the self-extracting release artifact.
  # ---------------------------------------------------------------------------
  build-verify:
    runs-on: [self-hosted, qnca]
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build installer
        run: bash /opt/claude-web/build-installer.sh

      - name: Verify installer integrity
        run: |
          /opt/claude-web/install.sh --verify-only
          echo "Installer integrity check passed"

      - name: Build release artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          bash /opt/claude-web/build-release.sh 2>&1 | tee ${RUNNER_TEMP}/build_release_output.txt

      - name: Verify release artifact exists
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          RELEASE_FILE=$(ls -t /opt/claude-web/qn-code-assistant-v*.sh 2>/dev/null | head -1)
          if [ -z "${RELEASE_FILE}" ]; then
            echo "::error::Release artifact not found — expected qn-code-assistant-v*.sh"
            exit 1
          fi
          echo "Release artifact verified: ${RELEASE_FILE}"

      - name: Verify VERSION matches git tag
        run: |
          FILE_VERSION=$(grep -oP '^VERSION\s*=\s*[\x27"]\K[^\x27"]+' app.py | head -1)
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          echo "File VERSION: ${FILE_VERSION}"
          echo "Latest git tag: ${LATEST_TAG}"
          if [ "${LATEST_TAG}" != "none" ] && [ "v${FILE_VERSION}" != "${LATEST_TAG}" ]; then
            echo "::warning::VERSION ${FILE_VERSION} does not match latest tag ${LATEST_TAG}"
          fi

      - name: Validate systemd service ReadWritePaths
        run: |
          python3 -c "
          content = open('qn-code-assistant.service').read()
          required = ['auth.json', 'user-data']
          missing = [p for p in required if p not in content]
          if missing:
              raise SystemExit(f'Missing ReadWritePaths entries: {missing}')
          print('ReadWritePaths coverage OK')
          "

      - name: Validate deny list coverage
        run: |
          python3 -c "
          import json
          settings = json.load(open('.claude/settings.json'))
          deny = [str(r) for r in settings.get('deny', [])]
          deny_str = ' '.join(deny)
          dangerous = ['rm', 'rmdir', 'dd', 'mkfs', 'git reset --hard', 'git clean']
          missing = [d for d in dangerous if d not in deny_str]
          if missing:
              print(f'::warning::Deny list may not cover: {missing}')
          else:
              print('Deny list coverage OK')
          "

      - name: Verify PreToolUse hook exists
        run: |
          test -x .claude/hooks/preToolUse.sh || (echo "::warning::PreToolUse hook missing or not executable"; exit 0)
          echo "PreToolUse hook present and executable"

      - name: Audit continue-on-error usage
        run: |
          COUNT=$(grep -c 'continue-on-error: true' .github/workflows/ci.yml || echo 0)
          if [ "${COUNT}" -gt 0 ]; then
            echo "::warning::${COUNT} job(s) using continue-on-error: true — review and harden"
          fi

      - name: Verify Claude CLI --permission-mode auto
        run: |
          if ! command -v claude &> /dev/null; then
            echo "::warning::Claude CLI not found — skipping permission-mode check"
            exit 0
          fi
          if claude --help 2>&1 | grep -q 'permission-mode'; then
            echo "Claude CLI supports --permission-mode flag"
          else
            echo "::error::Claude CLI does not support --permission-mode flag"
            exit 1
          fi

